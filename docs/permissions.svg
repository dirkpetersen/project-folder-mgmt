<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1070" viewBox="0 0 1400 1070" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', 'Fira Code', monospace" font-size="13">
  <defs>
    <style>
      .bg         { fill: #0d0f14; }
      .panel      { fill: #13161e; stroke: #252a38; stroke-width: 1.5; }
      .title      { fill: #e2e8f0; font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; }
      .subtitle   { fill: #64748b; font-size: 11px; font-family: 'Inter', sans-serif; }
      .dir        { fill: #1c202c; stroke: #2e3447; stroke-width: 1.5; }
      .dir-label  { fill: #e2e8f0; font-size: 13px; }
      .own        { fill: #94a3b8; font-size: 11px; }
      .mode2750   { fill: #fcd34d; font-size: 12px; font-weight: 600; }
      .mode2770   { fill: #86efac; font-size: 12px; font-weight: 600; }
      .mode0600   { fill: #fca5a5; font-size: 12px; font-weight: 600; }
      .grp        { fill: #c4b5fd; font-size: 12px; }
      .note       { fill: #94a3b8; font-size: 11px; font-family: 'Inter', sans-serif; }
      .highlight  { fill: #a5b4fc; font-size: 11px; font-family: 'Inter', sans-serif; font-style: italic; }
      .legend-box { fill: #1c202c; stroke: #252a38; stroke-width: 1; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2e3447"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1020" class="bg"/>

  <!-- ═══════════════════════════════════════════════════
       DIAGRAM 1 — Simple project (just /shr)
  ═══════════════════════════════════════════════════ -->
  <rect x="20" y="20" width="420" height="600" rx="10" class="panel"/>
  <text x="40" y="52" class="title">① Simple Project</text>
  <text x="40" y="70" class="subtitle">1 group · covers ~80% of use cases · grows on demand</text>

  <!-- projects/ -->
  <rect x="40" y="88" width="380" height="54" rx="7" class="dir"/>
  <text x="60" y="109" class="dir-label">📁  projects/</text>
  <text x="60" y="127" class="own">owner: root:root  ·  755</text>

  <!-- projects/myproject/ -->
  <rect x="70" y="162" width="350" height="66" rx="7" class="dir"/>
  <text x="90" y="183" class="dir-label">📁  myproject/</text>
  <text x="90" y="200" class="own">owner: root:grp-myproject</text>
  <text x="90" y="216" class="mode2750">chmod 2750  →  drwxr-x--- + setgid</text>

  <!-- .project.json -->
  <rect x="100" y="248" width="300" height="52" rx="7" class="dir"/>
  <text x="118" y="268" class="dir-label">🔒  .project.json</text>
  <text x="118" y="284" class="own">owner: root:root</text>
  <text x="118" y="298" class="mode0600">chmod 0600  →  root only</text>

  <!-- shr/ -->
  <rect x="100" y="320" width="300" height="66" rx="7" class="dir"/>
  <text x="118" y="341" class="dir-label">📂  shr/</text>
  <text x="118" y="358" class="own">owner: root:grp-myproject</text>
  <text x="118" y="374" class="mode2770">chmod 2770  →  drwxrws--- + setgid</text>

  <!-- tree lines -->
  <line x1="80" y1="195" x2="100" y2="248" stroke="#2e3447" stroke-width="1.5"/>
  <line x1="80" y1="195" x2="100" y2="320" stroke="#2e3447" stroke-width="1.5"/>
  <line x1="60" y1="142" x2="70" y2="162" stroke="#2e3447" stroke-width="1.5"/>

  <!-- Single group box -->
  <rect x="40" y="408" width="380" height="82" rx="7" fill="#1a1040" stroke="#6366f1" stroke-width="1.5"/>
  <text x="58" y="428" class="grp">🔑  grp-myproject</text>
  <text x="58" y="446" class="note">all project members belong here</text>
  <text x="58" y="464" class="note">can traverse myproject/  and  read/write shr/</text>
  <text x="58" y="482" class="note">all members can manage  ·  no extra groups needed</text>

  <!-- Growth callout -->
  <rect x="40" y="502" width="380" height="70" rx="7" fill="#0d1a10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="58" y="522" fill="#86efac" font-size="12" font-weight="600" font-family="'Inter',sans-serif">✦  Designed to grow</text>
  <text x="58" y="540" class="note">One group is enough for most projects. When a project</text>
  <text x="58" y="558" class="note">grows sensitive, add an -adm group (→ ②) or a restricted</text>
  <text x="58" y="576" class="note">subfolder (→ ③) without touching existing permissions.</text>

  <!-- What they see -->
  <rect x="40" y="584" width="380" height="24" rx="5" fill="#0f1318"/>
  <text x="58" y="600" class="note">any member sees:  myproject/  →  shr/   ·   others: invisible</text>


  <!-- ═══════════════════════════════════════════════════
       DIAGRAM 2 — Sensitive project with /adm + stewards
  ═══════════════════════════════════════════════════ -->
  <rect x="470" y="20" width="440" height="640" rx="10" class="panel"/>
  <text x="490" y="52" class="title">② Sensitive Project  +  Data Stewards</text>
  <text x="490" y="70" class="subtitle">2 groups · -adm restricts management + adds private folder</text>

  <!-- project root -->
  <rect x="490" y="88" width="400" height="66" rx="7" class="dir"/>
  <text x="510" y="109" class="dir-label">📁  myproject/</text>
  <text x="510" y="126" class="own">owner: root:grp-myproject</text>
  <text x="510" y="142" class="mode2750">chmod 2750  →  drwxr-x--- + setgid</text>

  <!-- .project.json -->
  <rect x="520" y="174" width="350" height="52" rx="7" class="dir"/>
  <text x="538" y="194" class="dir-label">🔒  .project.json</text>
  <text x="538" y="210" class="own">owner: root:root</text>
  <text x="538" y="224" class="mode0600">chmod 0600  →  root only</text>

  <!-- shr/ -->
  <rect x="520" y="246" width="350" height="66" rx="7" class="dir"/>
  <text x="538" y="267" class="dir-label">📂  shr/</text>
  <text x="538" y="284" class="own">owner: root:grp-myproject</text>
  <text x="538" y="300" class="mode2770">chmod 2770  →  drwxrws--- + setgid</text>

  <!-- adm/ -->
  <rect x="520" y="332" width="350" height="66" rx="7" fill="#1a1040" stroke="#6366f1" stroke-width="1.5"/>
  <text x="538" y="353" class="dir-label">📂  adm/</text>
  <text x="538" y="370" class="own">owner: root:grp-myproject-adm</text>
  <text x="538" y="386" class="mode2770">chmod 2770  →  drwxrws--- + setgid</text>

  <!-- tree lines -->
  <line x1="510" y1="154" x2="520" y2="174" stroke="#2e3447" stroke-width="1.5"/>
  <line x1="510" y1="154" x2="520" y2="246" stroke="#2e3447" stroke-width="1.5"/>
  <line x1="510" y1="154" x2="520" y2="332" stroke="#2e3447" stroke-width="1.5"/>

  <!-- ABE callout -->
  <rect x="520" y="416" width="350" height="28" rx="5" fill="#1c1008" stroke="#f59e0b" stroke-width="1"/>
  <text x="538" y="434" fill="#fcd34d" font-size="11" font-family="'Inter',sans-serif">⚠  Samba ABE: adm/ invisible to plain members</text>

  <!-- primary group -->
  <rect x="490" y="458" width="400" height="64" rx="7" fill="#1a1040" stroke="#6366f1" stroke-width="1.5"/>
  <text x="508" y="478" class="grp">🔑  grp-myproject</text>
  <text x="508" y="496" class="note">all project members  ·  access: shr/ only</text>
  <text x="508" y="514" class="note">management rights delegated to -adm group</text>

  <!-- adm group -->
  <rect x="490" y="532" width="400" height="64" rx="7" fill="#120820" stroke="#a855f7" stroke-width="1.5"/>
  <text x="508" y="552" fill="#d8b4fe" font-size="12" font-weight="600">🔑  grp-myproject-adm  (data stewards)</text>
  <text x="508" y="570" class="note">designated stewards only  ·  can manage the project</text>
  <text x="508" y="588" class="note">can also see and write to adm/</text>

  <!-- What they see -->
  <rect x="490" y="606" width="400" height="42" rx="5" fill="#0f1318"/>
  <text x="508" y="623" class="note">plain member:   shr/ only</text>
  <text x="508" y="640" class="note">data steward:   shr/  +  adm/   ·   non-member: invisible</text>


  <!-- ═══════════════════════════════════════════════════
       DIAGRAM 3 — Stewards + samples subfolder
  ═══════════════════════════════════════════════════ -->
  <rect x="940" y="20" width="440" height="760" rx="10" class="panel"/>
  <text x="960" y="52" class="title">③ Stewards  +  Restricted Subfolder</text>
  <text x="960" y="70" class="subtitle">3 groups · each subfolder has its own group</text>

  <!-- project root -->
  <rect x="960" y="88" width="400" height="66" rx="7" class="dir"/>
  <text x="980" y="109" class="dir-label">📁  myproject/</text>
  <text x="980" y="126" class="own">owner: root:grp-myproject</text>
  <text x="980" y="142" class="mode2750">chmod 2750  →  drwxr-x--- + setgid</text>

  <!-- .project.json -->
  <rect x="990" y="174" width="360" height="52" rx="7" class="dir"/>
  <text x="1008" y="194" class="dir-label">🔒  .project.json</text>
  <text x="1008" y="210" class="own">owner: root:root</text>
  <text x="1008" y="224" class="mode0600">chmod 0600  →  root only</text>

  <!-- shr/ -->
  <rect x="990" y="246" width="360" height="66" rx="7" class="dir"/>
  <text x="1008" y="267" class="dir-label">📂  shr/</text>
  <text x="1008" y="284" class="own">owner: root:grp-myproject</text>
  <text x="1008" y="300" class="mode2770">chmod 2770  →  drwxrws--- + setgid</text>

  <!-- adm/ -->
  <rect x="990" y="332" width="360" height="66" rx="7" fill="#1a1040" stroke="#6366f1" stroke-width="1.5"/>
  <text x="1008" y="353" class="dir-label">📂  adm/</text>
  <text x="1008" y="370" class="own">owner: root:grp-myproject-adm</text>
  <text x="1008" y="386" class="mode2770">chmod 2770  →  drwxrws--- + setgid</text>

  <!-- samples/ -->
  <rect x="990" y="418" width="360" height="66" rx="7" fill="#0c1a12" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1008" y="439" class="dir-label">📂  samples/</text>
  <text x="1008" y="456" class="own">owner: root:grp-myproject-samples</text>
  <text x="1008" y="472" class="mode2770">chmod 2770  →  drwxrws--- + setgid</text>

  <!-- tree lines -->
  <line x1="980" y1="154" x2="990" y2="174" stroke="#2e3447" stroke-width="1.5"/>
  <line x1="980" y1="154" x2="990" y2="246" stroke="#2e3447" stroke-width="1.5"/>
  <line x1="980" y1="154" x2="990" y2="332" stroke="#2e3447" stroke-width="1.5"/>
  <line x1="980" y1="154" x2="990" y2="418" stroke="#2e3447" stroke-width="1.5"/>

  <!-- ABE callout -->
  <rect x="990" y="502" width="360" height="28" rx="5" fill="#1c1008" stroke="#f59e0b" stroke-width="1"/>
  <text x="1008" y="520" fill="#fcd34d" font-size="11" font-family="'Inter',sans-serif">⚠  ABE: adm/ and samples/ invisible to non-members</text>

  <!-- primary group -->
  <rect x="960" y="544" width="400" height="58" rx="7" fill="#1a1040" stroke="#6366f1" stroke-width="1.5"/>
  <text x="978" y="564" class="grp">🔑  grp-myproject</text>
  <text x="978" y="582" class="note">all project members  ·  access: shr/ only</text>
  <text x="978" y="598" class="note">management delegated to -adm group</text>

  <!-- adm group -->
  <rect x="960" y="612" width="400" height="58" rx="7" fill="#120820" stroke="#a855f7" stroke-width="1.5"/>
  <text x="978" y="632" fill="#d8b4fe" font-size="12" font-weight="600">🔑  grp-myproject-adm  (data stewards)</text>
  <text x="978" y="650" class="note">designated stewards  ·  manage project  ·  see adm/</text>
  <text x="978" y="666" class="note">ABE hides adm/ from everyone else</text>

  <!-- samples group -->
  <rect x="960" y="680" width="400" height="58" rx="7" fill="#0a1a0e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="978" y="700" fill="#86efac" font-size="12" font-weight="600">🔑  grp-myproject-samples</text>
  <text x="978" y="718" class="note">samples sub-team only  ·  see and write to samples/</text>
  <text x="978" y="734" class="note">ABE hides samples/ from everyone else</text>

  <!-- What they see -->
  <rect x="960" y="748" width="400" height="20" rx="4" fill="#0f1318"/>
  <text x="978" y="762" class="note">plain member: shr/   steward: shr/+adm/   samples: shr/+samples/   both: all three</text>


  <!-- ═══════════════════════════════════════════════════
       BOTTOM ROW — Key + growth path
  ═══════════════════════════════════════════════════ -->

  <!-- Key panel (full width, below all three columns) -->
  <rect x="20" y="800" width="1360" height="128" rx="10" class="panel"/>
  <text x="40" y="826" class="title">Permission Key</text>

  <rect x="40" y="840" width="14" height="14" rx="3" fill="#fcd34d" opacity="0.8"/>
  <text x="64" y="852" class="own">2750  =  owner rwx · group r-x · others ---  + setgid   →   gatekeeper root: group can enter and read, but not write here</text>

  <rect x="40" y="864" width="14" height="14" rx="3" fill="#86efac" opacity="0.8"/>
  <text x="64" y="876" class="own">2770  =  owner rwx · group rwx · others ---  + setgid   →   full collaboration: group can read, write, and new files inherit group</text>

  <rect x="40" y="888" width="14" height="14" rx="3" fill="#fca5a5" opacity="0.8"/>
  <text x="64" y="900" class="own">0600  =  owner rw  · group ---  · others ---             →   root-only: metadata file never exposed to project group or members</text>

  <text x="40" y="920" fill="#6366f1" font-size="11" font-family="'Inter',sans-serif">setgid (the leading 2) is mandatory on every directory — new files and subdirectories inherit the parent directory's group, not the creator's primary group</text>

  <!-- Growth path panel (full width) -->
  <rect x="20" y="942" width="1360" height="108" rx="10" class="panel"/>
  <text x="40" y="968" class="title">Complexity grows on demand — no retrofitting required</text>

  <rect x="40" y="982" width="380" height="56" rx="6" fill="#0d1a10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="54" y="1002" fill="#86efac" font-size="12" font-weight="600" font-family="'Inter',sans-serif">① 1 group</text>
  <text x="54" y="1020" class="note">root + shr/   ·   covers ~80% of projects</text>
  <text x="54" y="1035" class="note">all members manage</text>

  <text x="436" y="1014" fill="#2e3447" font-size="22">→</text>

  <rect x="466" y="982" width="420" height="56" rx="6" fill="#120820" stroke="#a855f7" stroke-width="1.5"/>
  <text x="480" y="1002" fill="#d8b4fe" font-size="12" font-weight="600" font-family="'Inter',sans-serif">② + -adm group</text>
  <text x="480" y="1020" class="note">add data stewards   ·   project turns sensitive</text>
  <text x="480" y="1035" class="note">existing shr/ left untouched</text>

  <text x="902" y="1014" fill="#2e3447" font-size="22">→</text>

  <rect x="932" y="982" width="448" height="56" rx="6" fill="#0c1a12" stroke="#22c55e" stroke-width="1.5"/>
  <text x="946" y="1002" fill="#86efac" font-size="12" font-weight="600" font-family="'Inter',sans-serif">③ + per-subfolder groups</text>
  <text x="946" y="1020" class="note">restricted sibling folders   ·   each with its own group</text>
  <text x="946" y="1035" class="note">existing folders always left untouched</text>

</svg>
