<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Project Manager{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  {% if request.cookies.get('pfm_user') %}
  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="topbar-brand">
        <span class="brand-icon">⬡</span>
        <span class="brand-text">ProjectVault</span>
      </a>
      <nav class="topbar-nav">
        <a href="/" class="nav-link">Dashboard</a>
        <div class="user-pill">
          <span class="user-avatar">{{ request.cookies.get('pfm_user')[0].upper() }}</span>
          <span class="user-name">{{ request.cookies.get('pfm_user') }}</span>
          <a href="/logout" class="logout-link">Sign out</a>
        </div>
      </nav>
    </div>
  </header>
  {% endif %}

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
